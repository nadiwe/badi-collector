name: Badi Daten sammeln

on:
  schedule:
    - cron: "0 * * * *"   # stündlicher Fallback falls Kette abbricht
  workflow_dispatch:        # auch manuell startbar

jobs:
  collect:
    runs-on: ubuntu-latest
    concurrency:
      group: badi-collect
      cancel-in-progress: true   # nur eine Instanz gleichzeitig
    permissions:
      contents: write
      actions: write

    steps:
      - name: Bis zum nächsten 15-Min-Slot warten
        run: |
          SLEEP=$(( 900 - $(date +%s) % 900 ))
          [ "$SLEEP" -gt 840 ] && SLEEP=840
          echo "Warte ${SLEEP}s bis zum nächsten :00/:15/:30/:45 ..."
          sleep "$SLEEP"

      - name: Zeitfenster prüfen
        id: zeitcheck
        run: |
          STUNDE=$(TZ=Europe/Zurich date +%H | sed 's/^0//')
          if [ "$STUNDE" -lt 6 ] || [ "$STUNDE" -ge 22 ]; then
            echo "Ausserhalb Zeitfenster (${STUNDE}:xx Zürich), überspringe."
            echo "aktiv=false" >> $GITHUB_OUTPUT
          else
            echo "Innerhalb Zeitfenster (${STUNDE}:xx Zürich), sammle Daten."
            echo "aktiv=true" >> $GITHUB_OUTPUT
          fi

      - name: Repository laden
        if: steps.zeitcheck.outputs.aktiv == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python vorbereiten
        if: steps.zeitcheck.outputs.aktiv == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        if: steps.zeitcheck.outputs.aktiv == 'true'
        run: pip install websockets==15.0.1

      - name: Daten sammeln
        if: steps.zeitcheck.outputs.aktiv == 'true'
        run: python collect.py

      - name: Daten speichern
        if: steps.zeitcheck.outputs.aktiv == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Badi Daten $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Nächsten Run einplanen
        if: always()
        run: gh workflow run collect.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
