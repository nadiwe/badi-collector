name: Stammdaten-Prüfung

on:
  schedule:
    - cron: "0 7 12 7 *"  # 12. Juli um 07:00 UTC — jährlich
  workflow_dispatch:        # auch manuell startbar

jobs:
  pruefung:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Repository laden
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Prüfliste generieren
        run: |
          python3 - <<'PYEOF'
          import json
          from datetime import date

          with open("data/badi-stammdaten.json", encoding="utf-8") as f:
              data = json.load(f)

          year = date.today().year
          rev_key = f"revision_{year}"
          saison_key = f"saison_{year}"

          oeffnungszeiten_items = []
          temperatur_items = []
          revision_items = []
          saison_items = []

          for section in ["hallenbäder", "freibäder", "flussbäder", "seebäder"]:
              is_halle = section == "hallenbäder"
              is_outdoor = section in ["freibäder", "flussbäder", "seebäder"]
              for venue in data.get(section, []):
                  name = venue.get("name", venue.get("uid", "?"))

                  oz = venue.get("oeffnungszeiten", {})
                  if oz.get("typ") == "manuell":
                      wert = oz.get("wert", "—")
                      quelle = oz.get("quelle", "?")
                      oeffnungszeiten_items.append(
                          f"- [ ] **{name}**: {wert}  \n  Quelle: {quelle}"
                      )

                  temp = venue.get("temperatur", {})
                  if temp.get("typ") == "manuell" and isinstance(temp.get("wert"), dict):
                      wert_str = ", ".join(f"{k}: {v}" for k, v in temp["wert"].items())
                      quelle = temp.get("quelle", "?")
                      temperatur_items.append(
                          f"- [ ] **{name}**: {wert_str}  \n  Quelle: {quelle}"
                      )

                  if is_halle and rev_key in venue:
                      rev = venue[rev_key]
                      wert = rev.get("wert", "—")
                      quelle = rev.get("quelle", "?")
                      revision_items.append(
                          f"- [ ] **{name}**: {wert}  \n  Quelle: {quelle}"
                      )

                  if is_outdoor and saison_key in venue:
                      saison = venue[saison_key]
                      wert = saison.get("wert", "—")
                      quelle = saison.get("quelle", "?")
                      saison_items.append(
                          f"- [ ] **{name}**: {wert}  \n  Quelle: {quelle}"
                      )

          body = f"## 📋 Stammdaten-Prüfung {year}\n\n"

          body += "### 🕐 Öffnungszeiten (manuell gepflegt)\n\n"
          body += ("\n".join(oeffnungszeiten_items) if oeffnungszeiten_items else "_Keine manuellen Einträge_") + "\n\n"

          body += "### 🌡️ Temperaturen (manuell gepflegt)\n\n"
          body += ("\n".join(temperatur_items) if temperatur_items else "_Keine manuellen Einträge_") + "\n\n"

          body += "### 🔧 Revisionsdaten Hallenbäder\n\n"
          body += ("\n".join(revision_items) if revision_items else "_Keine Einträge_") + "\n\n"

          body += "### 🌊 Saisonstart und Saisonende\n\n"
          body += ("\n".join(saison_items) if saison_items else "_Keine Einträge_") + "\n\n"

          body += "---\n_Automatisch generiert vom [stammdaten-pruefung Workflow](../../actions/workflows/stammdaten-pruefung.yml)_"

          with open("/tmp/issue_body.txt", "w") as f:
              f.write(body)
          total = len(oeffnungszeiten_items) + len(temperatur_items) + len(revision_items) + len(saison_items)
          print(f"✓ {total} Prüfpunkte generiert")
          PYEOF

      - name: GitHub Issue erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/issue_body.txt)
          YEAR=$(date +%Y)
          TITLE="📋 Stammdaten-Prüfung ${YEAR}"

          EXISTING=$(gh issue list --label "stammdaten" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Kommentar zu bestehendem Issue #$EXISTING hinzugefügt."
          else
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "stammdaten" 2>/dev/null || \
            gh issue create \
              --title "$TITLE" \
              --body "$BODY"
            echo "Neues Issue erstellt."
          fi
