name: Sicherheits- und Dependency-Check

on:
  schedule:
    - cron: "0 8 1 1,4,7,10 *"  # 1. Jan / Apr / Jul / Okt um 08:00 UTC
  workflow_dispatch:               # auch manuell startbar

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Repository laden
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Python vorbereiten
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Versionen prüfen
        id: check
        run: |
          python3 - <<'PYEOF'
          import json, re, urllib.request, sys

          findings = []

          # ── Leaflet (npm) ──────────────────────────────────────────────
          LEAFLET_PINNED = "1.9.4"
          with urllib.request.urlopen("https://registry.npmjs.org/leaflet/latest") as r:
              latest_leaflet = json.load(r)["version"]
          if latest_leaflet != LEAFLET_PINNED:
              findings.append(
                  f"**Leaflet** veraltet: `{LEAFLET_PINNED}` → `{latest_leaflet}`\n"
                  f"  - index.html Zeile 41–42 aktualisieren\n"
                  f"  - Neue SRI-Hashes berechnen: `curl -s https://unpkg.com/leaflet@{latest_leaflet}/dist/leaflet.js | openssl dgst -sha384 -binary | openssl base64 -A`"
              )
          else:
              print(f"✓ Leaflet {LEAFLET_PINNED} ist aktuell")

          # ── websockets (PyPI) ──────────────────────────────────────────
          WEBSOCKETS_PINNED = "15.0.1"
          with urllib.request.urlopen("https://pypi.org/pypi/websockets/json") as r:
              latest_ws = json.load(r)["info"]["version"]
          if latest_ws != WEBSOCKETS_PINNED:
              findings.append(
                  f"**websockets** veraltet: `{WEBSOCKETS_PINNED}` → `{latest_ws}`\n"
                  f"  - collect.yml: `pip install websockets=={latest_ws}` aktualisieren"
              )
          else:
              print(f"✓ websockets {WEBSOCKETS_PINNED} ist aktuell")

          # ── CSP-Header vorhanden? ──────────────────────────────────────
          with open("index.html", encoding="utf-8") as f:
              html = f.read()
          if "Content-Security-Policy" not in html:
              findings.append("**CSP fehlt**: Kein `Content-Security-Policy` Meta-Tag in index.html gefunden.")
          else:
              print("✓ CSP-Header vorhanden")

          # ── SRI auf Leaflet-Links? ─────────────────────────────────────
          if 'integrity="sha384-' not in html:
              findings.append("**SRI fehlt**: Keine `integrity`-Attribute auf CDN-Links gefunden.")
          else:
              print("✓ SRI-Hashes vorhanden")

          # ── Alle externen URLs HTTPS? ──────────────────────────────────
          http_urls = re.findall(r'(?<!")http://[^\s"\'<>]+', html)
          # Kommentare und Datenpfade ignorieren
          http_urls = [u for u in http_urls if not u.startswith("http://www.w3.org")]
          if http_urls:
              findings.append(f"**Unsichere HTTP-URLs** gefunden:\n" + "\n".join(f"  - `{u}`" for u in http_urls))
          else:
              print("✓ Alle externen URLs sind HTTPS")

          # ── Ausgabe ────────────────────────────────────────────────────
          if findings:
              body = "## 🔒 Sicherheits-Check — Handlungsbedarf\n\n"
              body += "\n\n".join(f"- {f}" for f in findings)
              body += "\n\n---\n_Automatisch generiert vom [security-check Workflow](../../actions/workflows/security-check.yml)_"
              with open("/tmp/issue_body.txt", "w") as f:
                  f.write(body)
              print(f"\n⚠️  {len(findings)} Findings — Issue wird erstellt.")
              sys.exit(0)
          else:
              print("\n✅ Alles aktuell — kein Issue nötig.")
              with open("/tmp/issue_body.txt", "w") as f:
                  f.write("")
          PYEOF

      - name: GitHub Issue erstellen (nur bei Findings)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/issue_body.txt)
          if [ -z "$BODY" ]; then
            echo "Keine Findings — kein Issue erstellt."
            exit 0
          fi

          # Prüfen ob bereits ein offenes Issue mit diesem Titel existiert
          EXISTING=$(gh issue list --label "security-check" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          QUARTER=$(date '+Q%q %Y' 2>/dev/null || python3 -c "
          from datetime import date
          d = date.today()
          q = (d.month - 1) // 3 + 1
          print(f'Q{q} {d.year}')
          ")
          TITLE="🔒 Dependency-Check ${QUARTER}: Updates verfügbar"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Kommentar zu bestehendem Issue #$EXISTING hinzugefügt."
          else
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "security-check" \
              --assignee "@me" 2>/dev/null || \
            gh issue create \
              --title "$TITLE" \
              --body "$BODY"
            echo "Neues Issue erstellt."
          fi
