<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#E4E2E0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#173D34;}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
a{text-decoration:none;color:inherit;}
::selection{background:#6E3BF2;color:#fff;}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.pulse{animation:livepulse 2s ease-in-out infinite;}
.card{transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 22px rgba(23,61,52,.14)!important;}

.stat-card:hover{background:#ECECEC;}
.chart-scroll::-webkit-scrollbar{display:none;}
.chart-scroll{scrollbar-width:none;}
</style>
</head>
<body>
<div id="app" style="min-height:100vh;background:#E4E2E0;padding:clamp(16px,3.5vw,40px);"></div>

<script>
// ── Design tokens ──────────────────────────────────────────────────────────
const INK    = '#173D34';
const PURPLE = '#6E3BF2';
const ORANGE = '#F47B43';
const BLACK  = '#000000';
const META   = '#8C8C8C';

const TYPE_COLOR = { fluss: PURPLE, see: INK, frei: ORANGE, halle: BLACK };
const TYPE_LABEL = { fluss: 'Flussbad', see: 'Seebad', frei: 'Freibad', halle: 'Hallenbad' };

// ── Venue metadata ─────────────────────────────────────────────────────────
const VENUES = [
  { uid:'BADI-1',   name:'Seebad Enge',                       type:'see',   tempUid:'seb6943', address:'Mythenquai 9, 8002 Zürich',              hours:'07:00–21:00', season:'Mai–Sep'   },
  { uid:'SSD-10',   name:'Seebad Utoquai',                    type:'see',   tempUid:'seb6945', address:'Utoquai 50, 8008 Zürich',                hours:'07:00–21:00', season:'Mai–Sep'   },
  { uid:'seb6946',  name:'Strandbad Mythenquai',              type:'see',   tempUid:'seb6946', address:'Mythenquai 95, 8002 Zürich',             hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'seb6947',  name:'Strandbad Tiefenbrunnen',           type:'see',   tempUid:'seb6947', address:'Bellerivestrasse 201, 8008 Zürich',      hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'seb6948',  name:'Strandbad Wollishofen',             type:'see',   tempUid:'seb6948', address:'Mythenquai 559, 8038 Zürich',            hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'flb6939',  name:'Flussbad Oberer Letten',            type:'fluss', tempUid:'flb6939', address:'Lettensteg 10, 8037 Zürich',             hours:'07:00–20:00', season:'Mai–Sep'   },
  { uid:'flb6940',  name:'Flussbad Unterer Letten',           type:'fluss', tempUid:'flb6940', address:'Wasserwerkstrasse 141, 8037 Zürich',     hours:'07:00–20:00', season:'Mai–Sep'   },
  { uid:'flb8803',  name:'Flussbad Unterer Letten (Flussteil)',type:'fluss',tempUid:'flb8803', address:'Wasserwerkstrasse 141, 8037 Zürich',     hours:'07:00–20:00', season:'Mai–Sep', note:'Flussteil' },
  { uid:'flb6941',  name:'Frauenbad Stadthausquai',           type:'fluss', tempUid:'flb6941', address:'Stadthausquai 12, 8001 Zürich',          hours:'07:00–20:00', season:'Mai–Sep', note:'Nur Frauen' },
  { uid:'LETZI-1',  name:'Freibad Letzigraben',               type:'frei',  tempUid:'fb002',   address:'Edelweissstrasse 5, 8048 Zürich',        hours:'09:00–21:30', season:'Mai–Sep', note:'Max-Frisch-Bad' },
  { uid:'fb006',    name:'Freibad Allenmoos',                 type:'frei',  tempUid:'fb006',   address:'Ria-Schwarzwald-Weg 1, 8057 Zürich',     hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'fb008',    name:'Freibad Auhof',                     type:'frei',  tempUid:'fb008',   address:'Glaubtenstrasse 67, 8046 Zürich',        hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'fb012',    name:'Freibad Heuried',                   type:'frei',  tempUid:'fb012',   address:'Döltschiweg 130, 8055 Zürich',           hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'SSD-11',   name:'Freibad Seebach',                   type:'frei',  tempUid:'fb013',   address:'Hertensteinstrasse 119, 8052 Zürich',    hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'fb018',    name:'Freibad Zwischen den Hölzern',      type:'frei',  tempUid:'fb018',   address:'Goldbrunnenstrasse 119, 8055 Zürich',    hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'SSD-8',    name:'Josel-Areal',                       type:'frei',  tempUid:null,      address:'Zürich',                                 hours:'09:00–20:00', season:'Mai–Sep'   },
  { uid:'SSD-2',    name:'Hallenbad Bläsi',                   type:'halle', tempUid:null,      address:'Hofwiesenstrasse 280, 8057 Zürich',      hours:'07:00–21:00', season:'Ganzjährig', defaultTemp:29 },
  { uid:'SSD-3',    name:'Hallenbad Bungertwies',             type:'halle', tempUid:null,      address:'Kronenstrasse 18, 8006 Zürich',          hours:'07:00–21:00', season:'Ganzjährig', defaultTemp:29 },
  { uid:'SSD-4',    name:'Hallenbad City',                    type:'halle', tempUid:null,      address:'Sihlstrasse 71, 8001 Zürich',            hours:'06:30–21:00', season:'Ganzjährig', defaultTemp:28 },
  { uid:'SSD-6',    name:'Hallenbad Leimbach',                type:'halle', tempUid:null,      address:'Leimbachstrasse 200, 8041 Zürich',       hours:'07:00–21:00', season:'Ganzjährig', defaultTemp:29 },
  { uid:'SSD-7',    name:'Hallenbad Oerlikon',                type:'halle', tempUid:null,      address:'Wallisellenstrasse 100, 8050 Zürich',    hours:'07:00–22:00', season:'Ganzjährig', defaultTemp:29 },
  { uid:'SSD-5',    name:'Wärmebad Käferberg',                type:'halle', tempUid:null,      address:'Emil-Klöti-Strasse 21, 8037 Zürich',     hours:'08:00–20:00', season:'Ganzjährig', defaultTemp:32 },
];

const VENUE_MAP = Object.fromEntries(VENUES.map(v => [v.uid, v]));

// ── State ──────────────────────────────────────────────────────────────────
let S = {
  filter: 'alle',
  sort: 'ruhig',
  currentUid: null,
  favs: {},
  period: 'heute',
  weekday: todayWd(),
  guestOpen: false,
  tempOpen: false,
  hoursOpen: false,
  chartZoomed: false,
  chartRes: '15min',
};

// ── Data ───────────────────────────────────────────────────────────────────
let AW = {};     // uid → {slots:{Werktag:[],Wochenende:[],Feiertag:[]}, messtage_echt, ...}
let LIVE = null; // {timestamp, venues:{uid:{currentfill,freespace,maxspace,temperatureWater,openClosed}}}
let TEMP_CACHE = {};         // tempUid → [{zeit, temp}]
let TEMP_CSV_LOADING = false;
let TEMP_CSV_DONE    = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function todayWd() {
  const d = new Date().getDay(); // 0=Sun
  return ['so','mo','di','mi','do','fr','sa'][d];
}

function isWeekend(wd) { return wd === 'sa' || wd === 'so'; }

function dayTypeFor(wd) { return isWeekend(wd) ? 'Wochenende' : 'Werktag'; }

function numFmt(n) {
  if (n == null || n < 0) return '–';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "’");
}

function nowHHMM() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function hhmm(s) { // "08:30" → minutes
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}

function computeIsOpen(uid) {
  const live = LIVE?.venues?.[uid];
  if (live?.openClosed === 'offen') return true;
  if (live?.openClosed === 'geschlossen') return false;
  // Fallback for venues without API open/closed data (Hallenbäder etc.)
  const v = VENUE_MAP[uid];
  if (!v?.hours) return false;
  const parts = v.hours.split(/[–-]/);
  if (parts.length !== 2) return false;
  const nowMin = nowHHMM();
  return nowMin >= hhmm(parts[0].trim()) && nowMin < hhmm(parts[1].trim());
}

function slotsFor(uid, dayType) {
  const b = AW[uid];
  if (!b) return [];
  return (b.slots[dayType] || []).filter(s => s.auslastung != null);
}

function nearestSlot(slots, nowMin) {
  if (!slots.length) return null;
  return slots.reduce((best, s) => {
    const d = Math.abs(hhmm(s.zeit) - nowMin);
    const bd = Math.abs(hhmm(best.zeit) - nowMin);
    return d < bd ? s : best;
  });
}

function computeDev(uid) {
  const live = LIVE?.venues?.[uid];
  if (!live || live.currentfill == null || !live.maxspace) return null;
  const dayType = dayTypeFor(S.weekday);
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return null;
  const slot = nearestSlot(slots, nowHHMM());
  if (!slot || !slot.auslastung) return null;
  const typical = slot.auslastung;
  const current = (live.currentfill / live.maxspace) * 100;
  return current / typical;
}

function devInfo(uid) {
  const live = LIVE?.venues?.[uid];
  const isOpen = computeIsOpen(uid);
  if (!isOpen) return { arrow:'', short:'geschlossen', color: META, barColor:'#DEDEDE' };
  const dev = computeDev(uid);
  if (dev == null) return { arrow:'≈', short:'etwa wie sonst', color: META, barColor: META };
  const pct = Math.round(Math.abs(dev - 1) * 100);
  if (dev >= 1.10) return { arrow:'▲', short: pct + '% voller als sonst', color: ORANGE, barColor: ORANGE };
  if (dev <= 0.90) return { arrow:'▼', short: pct + '% ruhiger als sonst', color: INK,    barColor: INK    };
  return { arrow:'≈', short:'etwa wie sonst', color: META, barColor: META };
}

function occPct(uid) {
  const live = LIVE?.venues?.[uid];
  if (!live || live.currentfill == null || !live.maxspace) return Infinity;
  return live.currentfill / live.maxspace;
}

function maxTemp(uid) {
  const v = VENUE_MAP[uid];
  const live = LIVE?.venues?.[uid];
  const t = live?.temperatureWater;
  return (t && !isNaN(parseFloat(t))) ? parseFloat(t) : -Infinity;
}

// ── Temp CSV helpers ───────────────────────────────────────────────────────
function currentWeekFile() {
  const d = new Date();
  const day = d.getDay() || 7;
  const thu = new Date(d);
  thu.setDate(d.getDate() + 4 - day);
  const yearStart = new Date(thu.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((thu - yearStart) / 86400000 + 1) / 7);
  return `${thu.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

function parseCSVRows(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const header = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    header.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

async function loadTempCSV() {
  if (TEMP_CSV_LOADING || TEMP_CSV_DONE) return;
  TEMP_CSV_LOADING = true;
  try {
    const r = await fetch(BASE + 'data/temperaturen/' + currentWeekFile() + '.csv');
    if (r.ok) {
      const rows = parseCSVRows(await r.text());
      const today = new Date().toISOString().slice(0, 10);
      const byUid = {};
      for (const row of rows) {
        if (!row.uid || !row.timestamp?.startsWith(today)) continue;
        const temp = parseFloat(row.temperatureWater);
        if (isNaN(temp)) continue;
        if (!byUid[row.uid]) byUid[row.uid] = [];
        byUid[row.uid].push({ zeit: row.timestamp.slice(11, 16), temp });
      }
      Object.assign(TEMP_CACHE, byUid);
    }
  } catch(e) {}
  TEMP_CSV_DONE = true;
  TEMP_CSV_LOADING = false;
  if (S.currentUid) render();
}

// ── Chart helpers ──────────────────────────────────────────────────────────
function groupByHour(slots) {
  const hours = {};
  for (const s of slots) {
    const h = s.zeit.split(':')[0];
    if (!hours[h]) hours[h] = { auslastung: 0, count: 0, zeit: h + ':00' };
    hours[h].auslastung += s.auslastung;
    hours[h].count++;
  }
  return Object.values(hours)
    .sort((a, b) => a.zeit.localeCompare(b.zeit))
    .map(g => ({ zeit: g.zeit, auslastung: g.auslastung / g.count }));
}

function tempSparkSVG(data, color) {
  if (!data || data.length < 2) return '';
  const temps = data.map(d => d.temp);
  const lo = Math.min(...temps) - 0.5, hi = Math.max(...temps) + 0.5;
  const range = hi - lo || 1;
  const W = 100, H = 28;
  const xs = i => (data.length > 1 ? (i / (data.length - 1)) * W : W / 2);
  const ys = v => H - 2 - ((v - lo) / range) * (H - 4);
  const path = data.map((d, i) => `${i ? 'L' : 'M'}${xs(i).toFixed(1)} ${ys(d.temp).toFixed(1)}`).join(' ');
  const area = path + ` L${xs(data.length-1).toFixed(1)} ${H} L${xs(0).toFixed(1)} ${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="${H}" style="display:block;overflow:visible;">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${xs(data.length-1).toFixed(1)}" cy="${ys(temps[temps.length-1]).toFixed(1)}" r="2.5" fill="${color}" stroke="#fff" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

// ── SVG chart helpers ──────────────────────────────────────────────────────
function sparklineSVG(uid, open) {
  const dayType = dayTypeFor(todayWd());
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return '';
  const vals = slots.map(s => s.auslastung);
  const max = Math.max(...vals, 0.001);
  const norm = vals.map(v => v / max);
  const nowMin = nowHHMM();
  const nowIdx = slots.reduce((bi, s, i) => {
    return Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi;
  }, 0);
  const color = open ? (TYPE_COLOR[VENUE_MAP[uid]?.type] || INK) : '#DEDEDE';
  const n = norm.length;
  const W = 100, H = 30, padB = 2;
  const xs = i => (n > 1 ? (i / (n - 1)) * W : W / 2);
  const ys = v => H - padB - Math.max(0.05, v) * (H - 4);
  let line = '';
  norm.forEach((v, i) => { line += (i ? 'L' : 'M') + xs(i).toFixed(1) + ' ' + ys(v).toFixed(1) + ' '; });
  const area = line + 'L' + W + ' ' + H + ' L0 ' + H + ' Z';
  const dot = open && nowIdx >= 0 ? `<circle cx="${xs(nowIdx).toFixed(1)}" cy="${ys(norm[nowIdx]).toFixed(1)}" r="2.5" fill="${color}" stroke="#fff" stroke-width="1.4" vector-effect="non-scaling-stroke"/>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="30" style="display:block;overflow:visible">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${line.trim()}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    ${dot}
  </svg>`;
}

function detailBarChart(uid, dayType, periodColor, zoomed, res) {
  let slots = slotsFor(uid, dayType);
  if (!slots.length) return '<div style="height:116px;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-family:\'IBM Plex Mono\',monospace;font-size:11px;">Noch keine Daten</div>';
  if (res === '1h') slots = groupByHour(slots);
  const vals = slots.map(s => s.auslastung);
  const max = Math.max(...vals, 0.001);
  const norm = vals.map(v => v / max);
  const nowMin = nowHHMM();
  const nowIdx = dayType === dayTypeFor(todayWd()) ? slots.reduce((bi, s, i) =>
    Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi, 0) : -1;
  const n = norm.length;
  const H = 34;
  const barPx = 20;
  const W    = zoomed ? n * barPx : 100;
  const gap  = zoomed ? 3 : (n > 12 ? 0.3 : 0.8);
  const bw   = zoomed ? barPx - gap : (W / n) - gap;
  const xs   = i => i * (W / n) + gap / 2;
  const ys   = v => H - 2 - Math.max(0.04, v) * (H - 4);

  const gridLines = [0, 0.33, 0.67, 1].map(f => {
    const gy = ys(f);
    return `<line x1="0" x2="${W}" y1="${gy.toFixed(1)}" y2="${gy.toFixed(1)}" stroke="#ECECE9" stroke-width="0.5" vector-effect="non-scaling-stroke"/>`;
  }).join('');

  const bars = norm.map((v, i) => {
    const isNow = i === nowIdx;
    const y = ys(v);
    const fill = isNow ? periodColor : periodColor + '38';
    return `<rect${isNow ? ' data-now="true"' : ''} x="${xs(i).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, (H - 2) - y).toFixed(1)}" rx="${Math.min(1.4, bw * 0.25).toFixed(1)}" fill="${fill}"/>`;
  }).join('');

  const step = zoomed
    ? (res === '1h' ? 1 : 4)
    : Math.max(1, Math.ceil(n / 6));
  const labels = slots.map((s, i) => {
    const show = zoomed ? (i % step === 0 || i === n - 1) : (i % step === 0 || i === n - 1);
    return zoomed
      ? `<div style="width:${barPx}px;flex-shrink:0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#ADADA9;overflow:hidden;">${show ? s.zeit : ''}</div>`
      : `<div style="flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#ADADA9;overflow:hidden;">${show ? s.zeit : ''}</div>`;
  }).join('');

  if (zoomed) {
    return `
    <div id="chart-scroll" style="overflow-x:auto;overflow-y:hidden;">
      <div style="width:${W}px;">
        <div style="height:116px;">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="${W}" height="100%" style="display:block;overflow:visible">
            ${gridLines}${bars}
          </svg>
        </div>
        <div style="display:flex;margin-top:7px;">${labels}</div>
      </div>
    </div>`;
  }
  return `
    <div style="position:relative;height:116px;">
      <div style="height:100%;margin-left:0;">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="100%" style="display:block;overflow:visible">
          ${gridLines}${bars}
        </svg>
      </div>
    </div>
    <div style="display:flex;gap:2px;margin-top:7px;">${labels}</div>`;
}

function seasonChart(uid, half, color) {
  const SOMMER = ['Mai','Jun','Jul','Aug','Sep'];
  const WINTER = ['Okt','Nov','Dez','Jan','Feb','Mär'];
  const months = half === 'sommer' ? SOMMER : WINTER;
  const saison = AW[uid]?.saison;

  // Wenn saisonale Durchschnittswerte vorhanden: zwei Balken (Sommer vs. Winter)
  if (saison) {
    const sVal = saison['Sommer_Mai_Sep'];
    const wVal = saison['Winter_Okt_Apr'];
    const vals = half === 'sommer'
      ? [sVal ?? 0, wVal ?? 0]
      : [wVal ?? 0, sVal ?? 0];
    const labels = half === 'sommer' ? ['Sommer', 'Winter'] : ['Winter', 'Sommer'];
    const colors = half === 'sommer' ? [ORANGE, INK + '60'] : [BLACK, ORANGE + '60'];
    const max = Math.max(...vals, 0.001);
    const norm = vals.map(v => v / max);
    const n = 2;
    const W = 100, H = 34, gap = 8;
    const bw = (W - gap) / n;
    const xs = i => i * (bw + gap);
    const ys = v => H - 2 - Math.max(0.04, v) * (H - 4);
    const bars = norm.map((v, i) => {
      const y = ys(v);
      return `<rect x="${xs(i).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, (H - 2) - y).toFixed(1)}" rx="2" fill="${colors[i]}"/>`;
    }).join('');
    const labelDivs = labels.map((l, i) =>
      `<div style="flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ADADA9;">${l}<br><span style="font-size:11px;font-weight:600;color:${INK};">${vals[i] != null ? vals[i].toFixed(1) + '%' : '–'}</span></div>`
    ).join('');
    return `
      <div style="height:116px;position:relative;">
        <div style="height:100%;">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="100%" style="display:block;">${bars}</svg>
        </div>
      </div>

// ── Filter / sort helpers ─────────────────────────────────────────────────
function filteredVenues() {
  let list = VENUES.slice();
  if (S.filter === 'fav') list = list.filter(v => S.favs[v.uid]);
  else if (S.filter !== 'alle') list = list.filter(v => v.type === S.filter);

  if (S.sort === 'ruhig') {
    list.sort((a, b) => occPct(a.uid) - occPct(b.uid));
  } else {
    list.sort((a, b) => maxTemp(b.uid) - maxTemp(a.uid));
  }
  return list;
}

function chipCounts() {
  const counts = { alle: VENUES.length, fluss: 0, see: 0, frei: 0, halle: 0, fav: 0 };
  VENUES.forEach(v => {
    counts[v.type]++;
    if (S.favs[v.uid]) counts.fav++;
  });
  return counts;
}

// ── Tile gauge SVG (weiße Balken auf farbigem Hintergrund) ───────────────
function tileGaugeSVG(uid, open) {
  const dayType = dayTypeFor(todayWd());
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return '<div style="height:34px;"></div>';
  const vals = slots.map(s => s.auslastung);
  const max = Math.max(...vals, 0.001);
  const norm = vals.map(v => v / max);
  const nowMin = nowHHMM();
  const nowIdx = open ? slots.reduce((bi, s, i) =>
    Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi, 0) : -1;
  const n = norm.length;
  const gap = n > 12 ? 0.3 : 0.7;
  const bw = (100 / n) - gap;
  const xs = i => i * (100 / n) + gap / 2;
  const bars = norm.map((v, i) => {
    const isNow = open && i === nowIdx;
    const h = Math.max(4, v * 100);
    const fill = isNow ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.28)';
    return `<div style="flex:1;height:${h.toFixed(1)}%;background:${fill};border-radius:2px 2px 0 0;position:relative;">
      ${isNow ? `<div style="position:absolute;left:0;right:0;bottom:${(v*100).toFixed(1)}%;height:0;border-top:2px dotted rgba(255,255,255,.5);"></div>` : ''}
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:${gap}px;height:34px;">${bars}</div>`;
}

  const d = new Date();
  const dateLabel = d.toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long' });
  const timeLabel = liveTs ? liveTs.slice(11, 16) : d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  let ageLabel = '';
  if (liveTs) {
    const liveDate = new Date(liveTs.replace(' ', 'T') + '+02:00');
    const ageMin = Math.round((d - liveDate) / 60000);
    if (ageMin >= 1) ageLabel = ` · vor ${ageMin} Min`;
  }

  const cards = list.map(renderCard).join('');
  const isEmpty = list.length === 0;

  const html = `
    <div style="max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:22px;">

      <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;">
        <div>
          <h1 style="font-family:'Outfit',sans-serif;font-size:clamp(28px,4vw,40px);font-weight:600;letter-spacing:-.01em;line-height:.95;color:${INK};">Wasserziit</h1>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:${META};margin-top:8px;letter-spacing:.03em;">
            Stand ${dateLabel}${liveTs ? ', ' + timeLabel + ' Uhr' + ageLabel : ''}
          </div>
        </div>
      </div>

      <section style="background:#FFFFFF;border-radius:28px;padding:22px;box-shadow:0 4px 22px rgba(23,61,52,.08);display:flex;flex-direction:column;gap:16px;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:space-between;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">${renderChips()}</div>
          <div style="display:flex;gap:6px;">${renderSortTabs()}</div>
        </div>

        <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:${META};">
          ${list.length} Badis · ${list.filter(v => computeIsOpen(v.uid)).length} offen
        </div>

        ${isEmpty ? `
          <div style="padding:44px 10px 54px;text-align:center;">
            <div style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:600;color:${INK};">Keni Badis gfunde</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${META};margin-top:10px;line-height:1.6;">Probier en andere Filter ode füeg Favoriten hinzue.</div>
          </div>` : `
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
            ${cards}
          </div>`}
      </section>

      <footer style="display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;padding-top:14px;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:${META};line-height:1.7;max-width:640px;">
          <div>Wassertemperatur &amp; Status — Sportamt Stadt Zürich</div>
          <div style="margin-top:4px;">Besucherzahlen — Crowdmonitor, badi-public.crowdmonitor.ch:9591/api</div>
          <div style="margin-top:4px;">Durchschnittliche Auslastung selber erhoben &amp; berechnet aus gesammelten Live-Daten, nicht offiziell.</div>
          <div style="margin-top:4px;">Saisonal Mai–Sep (Frei-/Fluss-/Seebäder), Hallenbäder ganzjährig. Privates, nicht-kommerzielles Projekt.</div>
        </div>
        <a href="https://www.stadt-zuerich.ch/stzh/bathdatadownload" target="_blank" rel="noopener"
          style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:${INK};text-decoration:underline;text-underline-offset:3px;white-space:nowrap;flex-shrink:0;">
          stadt-zuerich.ch ↗
        </a>
      </footer>
    </div>

    ${S.currentUid ? renderDetail() : ''}
  `;

  document.getElementById('app').innerHTML = html;

  if (S.chartZoomed && S.currentUid) {
    setTimeout(() => {
      const el = document.getElementById('chart-scroll');
      if (el) {
        const nowBar = el.querySelector('[data-now="true"]');
        if (nowBar) el.scrollLeft = Math.max(0, nowBar.offsetLeft - el.clientWidth / 2 + nowBar.offsetWidth / 2);
      }
    }, 0);
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
function setFilter(f)     { S.filter = f; render(); }
function setSort(s)       { S.sort = s; render(); }
function setPeriod(p)     { S.period = p; render(); }
function setWeekday(w)    { S.weekday = w; render(); }
function setChartRes(res) { S.chartRes = res; render(); }
function toggleChartZoom(){ S.chartZoomed = !S.chartZoomed; render(); }

function openDetail(uid) {
  S.currentUid = uid;
  S.guestOpen = false;
  S.tempOpen = false;
  S.hoursOpen = false;
  S.period = 'heute';
  S.chartZoomed = false;
  S.chartRes = '15min';
  render();
  document.querySelector('.modal-scrim')?.scrollTo(0, 0);
}

function closeDetail(e) {
  S.currentUid = null;
  render();
}

function toggleFav(uid) {
  if (S.favs[uid]) delete S.favs[uid]; else S.favs[uid] = true;
  try { localStorage.setItem('wasserzeit_favs', JSON.stringify(S.favs)); } catch(e) {}
  render();
}

function toggleStat(which) {
  // Paired expand: guest and temp expand together if in same row
  const guestEl = document.getElementById('sc-guest');
  const tempEl  = document.getElementById('sc-temp');
  const hoursEl = document.getElementById('sc-hours');

  let group = [which];
  try {
    const els = { guest: guestEl, temp: tempEl, hours: hoursEl };
    const clickedEl = els[which];
    if (clickedEl) {
      const clickedTop = Math.round(clickedEl.getBoundingClientRect().top);
      group = Object.keys(els).filter(k => els[k] && Math.round(els[k].getBoundingClientRect().top) === clickedTop);
    }
  } catch(e) {}

  const next = !S[which + 'Open'];
  group.forEach(k => { S[k + 'Open'] = next; });
  render();
}

// ── Init ───────────────────────────────────────────────────────────────────
try {
  const saved = localStorage.getItem('wasserzeit_favs');
  if (saved) S.favs = JSON.parse(saved) || {};
} catch(e) {}

render(); // show skeleton

// Relative zur aktuellen Seite — funktioniert auf GitHub Pages und lokal
const BASE = new URL('.', document.baseURI).href;

function parseLive(raw) {
  if (!raw) return null;
  const venues = {};
  for (const [uid, v] of Object.entries(raw.venues || {})) {
    const meta = VENUE_MAP[uid];
    const rawTemp = v.temperatureWater;
    const temp = (rawTemp != null && rawTemp !== '') ? Number(rawTemp) : (meta?.defaultTemp ?? null);
    venues[uid] = {
      currentfill:      (v.currentfill != null && v.currentfill !== '') ? Number(v.currentfill) : null,
      freespace:        (v.freespace   != null && v.freespace   !== '') ? Number(v.freespace)   : null,
      maxspace:         (v.maxspace    != null && v.maxspace    !== '') ? Number(v.maxspace)    : null,
      temperatureWater: temp,
      openClosed:       v.openClosed,
    };
  }
  return { timestamp: raw.timestamp, venues };
}

function fetchLive() {
  return fetch(BASE + 'data/live.json?t=' + Date.now()).then(r => r.ok ? r.json() : null).catch(() => null);
}

async function fetchBesucherWS() {
  return new Promise((resolve, reject) => {
    try {
      const ws = new WebSocket('wss://badi-public.crowdmonitor.ch:9591/api');
      const t = setTimeout(() => { ws.close(); reject(new Error('timeout')); }, 12000);
      ws.onopen    = () => ws.send('');
      ws.onmessage = e => { clearTimeout(t); ws.close(); try { resolve(JSON.parse(e.data)); } catch(err) { reject(err); } };
      ws.onerror   = () => { clearTimeout(t); reject(new Error('ws error')); };
    } catch(e) { reject(e); }
  });
}

async function fetchTemperaturenLive() {
  const r = await fetch('https://www.stadt-zuerich.ch/stzh/bathdatadownload', { cache: 'no-store' });
  if (!r.ok) throw new Error('temp');
  const doc = new DOMParser().parseFromString(await r.text(), 'text/xml');
  const byUid = {}, byName = {};
  for (const bath of doc.querySelectorAll('bath')) {
    const uid  = bath.querySelector('poiid')?.textContent?.trim();
    const name = bath.querySelector('title')?.textContent?.trim();
    const entry = {
      temperatureWater: bath.querySelector('temperatureWater')?.textContent?.trim() || null,
      openClosed:       bath.querySelector('openClosedTextPlain')?.textContent?.trim() || null,
    };
    if (uid)  byUid[uid]   = entry;
    if (name) byName[name] = entry;
  }
  return { byUid, byName };
}

async function fetchLiveRT() {
  const [wsRes, tempRes] = await Promise.allSettled([fetchBesucherWS(), fetchTemperaturenLive()]);
  if (wsRes.status !== 'fulfilled') throw new Error('WebSocket failed');
  const { byUid = {}, byName = {} } = tempRes.status === 'fulfilled' ? tempRes.value : {};
  const ts = new Date().toLocaleString('sv-SE', { timeZone: 'Europe/Zurich' });
  const venues = {};
  for (const bad of wsRes.value) {
    const uid = bad.uid;
    if (!uid || !VENUE_MAP[uid]) continue;
    const v = VENUE_MAP[uid];
    const tempUid = v.tempUid || uid;
    // Prefer Stadt-Zürich XML (by poiid, then by name), then WebSocket field as last resort
    const t = byUid[tempUid] || byName[v.name] || {};
    const wsTemp = bad.temperatureWater != null ? String(bad.temperatureWater) : null;
    venues[uid] = {
      currentfill:      bad.currentfill,
      freespace:        bad.freespace,
      maxspace:         bad.maxspace,
      temperatureWater: t.temperatureWater ?? wsTemp,
      openClosed:       t.openClosed ?? bad.openClosed ?? null,
    };
  }
  return { timestamp: ts, venues };
}

const getLive = () => fetchLiveRT().catch(() => fetchLive());

Promise.all([
  fetch(BASE + 'auswertung/auswertung.json').then(r => r.ok ? r.json() : null).catch(() => null),
  getLive(),
]).then(([aw, live]) => {
  if (aw?.badis) {
    AW = Object.fromEntries(aw.badis.map(b => [b.uid, b]));
  }
  LIVE = parseLive(live);
  render();

  // Auto-refresh every 5 minutes
  setInterval(async () => {
    const live = await getLive();
    if (live) { LIVE = parseLive(live); render(); }
  }, 5 * 60 * 1000);
});
</script>
