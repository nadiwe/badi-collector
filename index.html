];

const VENUE_MAP = Object.fromEntries(VENUES.map(v => [v.uid, v]));
// Umkehr-Mapping: Stadt-ZH-poiid (tempUid) → Crowdmonitor-uid
const _TEMP_UID_REV = Object.fromEntries(VENUES.filter(v => v.tempUid).map(v => [v.tempUid, v.uid]));

// Beckentemperaturen für Hallenbäder (geladen aus badi-stammdaten.json)
let HALLE_TEMPS = {
  'SSD-4': [
    { name: 'Schwimmerbecken',      temp: 28 },
    { name: 'Mehrzweckbecken',      temp: 29 },
    { name: 'Nichtschwimmerbecken', temp: 32 },
  ],
  'SSD-5': [
    { name: 'Wärmebad', temp: 32 },
  ],
  'SSD-1': [{ name: 'Schwimmerbecken', temp: 29 }, { name: 'Lehrschwimmbecken', temp: 30 }],
  'SSD-2': [{ name: 'Schwimmerbecken', temp: 29 }],
  'SSD-3': [{ name: 'Schwimmerbecken', temp: 29 }],
  'SSD-6': [{ name: 'Schwimmerbecken', temp: 28 }],
  'SSD-7': [
    { name: '50m-Schwimmerbecken',  temp: 28 },
    { name: 'Sprungbecken',         temp: 29 },
    { name: 'Nichtschwimmerbecken', temp: 30 },
    { name: 'Planschbecken',        temp: 30 },
  ],
};

// ── State ──────────────────────────────────────────────────────────────────
let S = {
  filter: 'alle',
  currentUid: null,
  favs: {},
  period: 'heute',
  weekday: todayWd(),
  guestOpen: false,
  tempOpen: false,
  hoursOpen: false,
  chartZoomed: false,
  chartRes: '15min',
  viewMode: 'cards',
};

// Render während Touch unterdrücken damit iOS-Scroll-Geste nicht unterbrochen wird
let _touchActive  = false;
let _renderQueued = false;

let _mapEl      = null; // persistent Leaflet container div (survives innerHTML re-renders)
let _map        = null;
let _markers    = {};
let _mapBasemap = 'gray';

// ── Data ───────────────────────────────────────────────────────────────────
let AW = {};     // uid → {slots:{Werktag:[],Wochenende:[],Feiertag:[]}, messtage_echt, ...}
let LIVE = null; // {timestamp, venues:{uid:{currentfill,freespace,maxspace,temperatureWater,openClosed}}}
let HEUTE_SLOTS     = {}; // uid → [{zeit:"HH:MM", auslastung:pct}] — heutige Istdaten aus CSV
let GUEST_WEEK_TOTAL = {}; // uid → {mo:sum, di:sum, ...} — Summe currentfill pro Wochentag aus CSV
let TEMP_WEEK       = {}; // uid → {mo:22, di:22, ...} — letzte Temp pro Wochentag aus CSV
let REVISIONEN  = {}; // uid → {von:"YYYY-MM-DD", bis:"YYYY-MM-DD", name}

// ── Helpers ────────────────────────────────────────────────────────────────
function todayWd() {
  const d = new Date().getDay(); // 0=Sun
  return ['so','mo','di','mi','do','fr','sa'][d];
}

function isWeekend(wd) { return wd === 'sa' || wd === 'so'; }

function dayTypeFor(wd) { return isWeekend(wd) ? 'Wochenende' : 'Werktag'; }

function numFmt(n) {
  if (n == null || n < 0) return '–';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "’");
}

function nowHHMM() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function hhmm(s) { // "08:30" → minutes
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}

function hoursForDay(uid, wd) {
  const v = VENUE_MAP[uid];
  return v?.hoursPerDay?.[wd] ?? v?.hours ?? null;
}

function computeIsOpen(uid) {
  if (isInRevision(uid)) return false;
  const live = LIVE?.venues?.[uid];
  const h = hoursForDay(uid, todayWd());
  // Öffnungszeiten sind zuverlässiger als API-Status (der bei voller Kapazität
  // oder Daten-Lag fälschlicherweise "geschlossen" meldet)
  if (h) {
    const parts = h.split(/[–-]/);
    if (parts.length === 2) {
      const nowMin = nowHHMM();
      if (nowMin >= hhmm(parts[0].trim()) && nowMin < hhmm(parts[1].trim())) {
        return true;
      }
    }
  }
  // Ausserhalb der Öffnungszeiten: nur "offen" wenn API es explizit sagt
  return live?.openClosed === 'offen';
}

function closingTime(uid) {
  const h = hoursForDay(uid, todayWd());
  if (!h) return null;
  const parts = h.split(/[–-]/);
  return parts.length === 2 ? parts[1].trim() : null;
}

function isInRevision(uid) {
  const r = REVISIONEN[uid];
  if (!r) return false;
  const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Zurich' });
  return today >= r.von && today <= r.bis;
}

async function loadRevisionen() {
  try {
    const res = await fetch(BASE + 'data/revisionen.json?t=' + Date.now());
    if (!res.ok) return;
    const list = await res.json();
    REVISIONEN = Object.fromEntries(list.map(r => [r.uid, r]));
  } catch(e) {}
}

async function loadStammdaten() {
  try {
    const res = await fetch(BASE + 'data/badi-stammdaten.json?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    const sections = ['hallenbäder', 'freibäder', 'flussbäder', 'seebäder'];
    for (const section of sections) {
      for (const entry of (data[section] || [])) {
        const v = VENUE_MAP[entry.uid];
        if (!v) continue;
        if (entry.standort) v.address = entry.standort;
        if (entry.besucher?.typ === 'keine') v.noOccupancy = true;
        const tw = entry.temperatur?.wert;
        if (entry.temperatur?.typ === 'manuell' && tw && typeof tw === 'object') {
          const pools = Object.entries(tw).map(([name, val]) => ({ name, temp: parseInt(val) }));
          HALLE_TEMPS[entry.uid] = pools;
          if (pools.length > 0) v.defaultTemp = pools[0].temp;
        }
      }
    }
  } catch(e) {}
}

function fmtRevDate(dateStr) {
  const M = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const [, m, d] = dateStr.split('-').map(Number);
  return d + '. ' + M[m - 1];
}

function slotsFor(uid, dayType) {
  if (dayType === 'Heute') return HEUTE_SLOTS[uid] || [];
  const b = AW[uid];
  if (!b) return [];
  return (b.slots[dayType] || []).filter(s => s.auslastung != null);
}

function nearestSlot(slots, nowMin) {
  if (!slots.length) return null;
  return slots.reduce((best, s) => {
    const d = Math.abs(hhmm(s.zeit) - nowMin);
    const bd = Math.abs(hhmm(best.zeit) - nowMin);
    return d < bd ? s : best;
  });
}

function computeDev(uid) {
  const live = LIVE?.venues?.[uid];
  if (!live || live.currentfill == null || !live.maxspace) return null;
  const dayType = dayTypeFor(S.weekday);
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return null;
  const slot = nearestSlot(slots, nowHHMM());
  if (!slot || !slot.auslastung) return null;
  const typical = slot.auslastung;
  const current = (live.currentfill / live.maxspace) * 100;
  return current / typical;
}

function devInfo(uid) {
  const live = LIVE?.venues?.[uid];
  if (isInRevision(uid)) return { arrow:'', short:'Revision', color: META, barColor:'#DEDEDE' };
  const isOpen = computeIsOpen(uid);
  if (!isOpen) return { arrow:'', short:'geschlossen', color: META, barColor:'#DEDEDE' };
  const dev = computeDev(uid);
  if (dev == null) return { arrow:'≈', short:'etwa wie sonst', color: META, barColor: META };
  const pct = Math.round(Math.abs(dev - 1) * 100);
  if (dev >= 1.10) return { arrow:'▲', short: pct + '% voller als sonst', color: ORANGE, barColor: ORANGE };
  if (dev <= 0.90) return { arrow:'▼', short: pct + '% ruhiger als sonst', color: INK,    barColor: INK    };
  return { arrow:'≈', short:'etwa wie sonst', color: META, barColor: META };
}


// ── Temp CSV helpers ───────────────────────────────────────────────────────
function currentWeekFile() {
  const d = new Date();
  const day = d.getDay() || 7;
  const thu = new Date(d);
  thu.setDate(d.getDate() + 4 - day);
  const yearStart = new Date(thu.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((thu - yearStart) / 86400000 + 1) / 7);
  return `${thu.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

function parseCSVRows(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const header = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    header.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}


// ── Chart helpers ──────────────────────────────────────────────────────────
function groupByHour(slots) {
  const hours = {};
  for (const s of slots) {
    const h = s.zeit.split(':')[0];
    if (!hours[h]) hours[h] = { auslastung: 0, count: 0, zeit: h + ':00' };
    hours[h].auslastung += s.auslastung;
    hours[h].count++;
  }
  return Object.values(hours)
    .sort((a, b) => a.zeit.localeCompare(b.zeit))
    .map(g => ({ zeit: g.zeit, auslastung: g.auslastung / g.count }));
}


// ── SVG chart helpers ──────────────────────────────────────────────────────
function sparklineSVG(uid, open) {
  const dayType = dayTypeFor(todayWd());
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return '';
  const vals = slots.map(s => s.auslastung);
  const max = Math.max(...vals, 0.001);
  const norm = vals.map(v => v / max);
  const nowMin = nowHHMM();
  const nowIdx = slots.reduce((bi, s, i) => {
    return Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi;
  }, 0);
  const color = open ? (TYPE_COLOR[VENUE_MAP[uid]?.type] || INK) : '#DEDEDE';
  const n = norm.length;
  const W = 100, H = 30, padB = 2;
  const xs = i => (n > 1 ? (i / (n - 1)) * W : W / 2);
  const ys = v => H - padB - Math.max(0.05, v) * (H - 4);
  let line = '';
  norm.forEach((v, i) => { line += (i ? 'L' : 'M') + xs(i).toFixed(1) + ' ' + ys(v).toFixed(1) + ' '; });
  const area = line + 'L' + W + ' ' + H + ' L0 ' + H + ' Z';
  const dot = open && nowIdx >= 0 ? `<circle cx="${xs(nowIdx).toFixed(1)}" cy="${ys(norm[nowIdx]).toFixed(1)}" r="2.5" fill="${color}" stroke="#fff" stroke-width="1.4" vector-effect="non-scaling-stroke"/>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="30" style="display:block;overflow:visible">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${line.trim()}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    ${dot}
  </svg>`;
}

function detailBarChart(uid, dayType, periodColor, zoomed, res, showFocus, wd) {
  let slots = slotsFor(uid, dayType);
  // Hüt-Tab ohne Live-Daten → Wochentag-Durchschnitt als Fallback
  if (!slots.length && dayType === 'Heute') {
    slots = slotsFor(uid, todayWd());
    if (!slots.length) slots = slotsFor(uid, dayTypeFor(todayWd()));
    showFocus = false;
  }
  if (!slots.length) return '<div style="height:116px;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-family:\'IBM Plex Mono\',monospace;font-size:11px;">Noch keine Daten</div>';

  // Hüt-Tab: Wochentag-Durchschnitt für Ghost-Balken (unabhängig von Live-Daten)
  let histSlots = dayType === 'Heute'
    ? (slotsFor(uid, todayWd()).length ? slotsFor(uid, todayWd()) : slotsFor(uid, dayTypeFor(todayWd())))
    : [];

  // 1h und Übersicht: Stunden-Durchschnitt; 15min: Rohdaten
  if (!zoomed || res === '1h') slots = groupByHour(slots);
  if (histSlots.length && (!zoomed || res === '1h')) histSlots = groupByHour(histSlots);

  // Auf Öffnungszeiten einschränken
  const meta = VENUE_MAP[uid];
  function openingParts() {
    const h = (wd ? hoursForDay(uid, wd) : null) || meta?.hours;
    if (!h) return null;
    const parts = h.split(/[–-]/);
    return parts.length === 2 ? parts.map(p => p.trim()) : null;
  }
  function filterToHours(arr) {
    const p = openingParts();
    if (!p) return arr;
    const oMin = hhmm(p[0]), cMin = hhmm(p[1]);
    const f = arr.filter(s => hhmm(s.zeit) >= oMin && hhmm(s.zeit) <= cMin);
    return f.length >= 3 ? f : arr;
  }
  slots = filterToHours(slots);
  if (histSlots.length) histSlots = filterToHours(histSlots);

  // Für 1h-aggregierte Modi: fehlende Stunden bis Schliesszeit auffüllen
  if (!zoomed || res === '1h') {
    const p = openingParts();
    if (p) {
      const oH = parseInt(p[0]), cH = parseInt(p[1]);
      const existing = new Set(slots.map(s => parseInt(s.zeit)));
      const extra = [];
      for (let h = oH; h <= cH; h++) {
        if (!existing.has(h))
          extra.push({ zeit: String(h).padStart(2, '0') + ':00', auslastung: null });
      }
      if (extra.length) slots = [...slots, ...extra].sort((a, b) => hhmm(a.zeit) - hhmm(b.zeit));
    }
  }

  // Für 15min-Modus: Sentinel-Nullpunkte an Öffnungs-/Schliesszeit damit X-Achse vollen Tag zeigt
  if (zoomed && res === '15min') {
    const p = openingParts();
    if (p && slots.length) {
      const oMin = hhmm(p[0]), cMin = hhmm(p[1]);
      const extra = [];
      if (hhmm(slots[0].zeit) > oMin)
        extra.push({ zeit: p[0], auslastung: null });
      if (hhmm(slots[slots.length - 1].zeit) < cMin)
        extra.push({ zeit: p[1], auslastung: null });
      if (extra.length) slots = [...slots, ...extra].sort((a, b) => hhmm(a.zeit) - hhmm(b.zeit));
    }
  }

  // Ghost-Balken: Hist-Zeitachse in Haupt-Slots einmergen, hist-Wert annotieren
  if (histSlots.length) {
    const histMap = new Map(histSlots.filter(s => s.auslastung != null).map(s => [s.zeit, s.auslastung]));
    const existing = new Set(slots.map(s => s.zeit));
    const extra = [...histMap.keys()].filter(zt => !existing.has(zt)).map(zt => ({ zeit: zt, auslastung: null }));
    if (extra.length) slots = [...slots, ...extra].sort((a, b) => hhmm(a.zeit) - hhmm(b.zeit));
    slots = slots.map(s => ({ ...s, hist: histMap.get(s.zeit) ?? null }));
  }

  const isToday = showFocus === true;
  const nowMin  = nowHHMM();

  // Aktuellen Live-Wert als Balken einfügen (nur heute, nur wenn Live-Daten vorhanden)
  if (isToday) {
    const lv = LIVE?.venues?.[uid];
    if (lv?.currentfill != null && lv?.maxspace) {
      const nowPct = parseFloat(lv.currentfill) / lv.maxspace * 100;
      const d = new Date();
      const liveZeit = (!zoomed || res === '1h')
        ? String(d.getHours()).padStart(2, '0') + ':00'
        : String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      const existIdx = slots.findIndex(s => s.zeit === liveZeit);
      if (existIdx >= 0) {
        slots[existIdx] = { zeit: liveZeit, auslastung: nowPct };
      } else {
        slots = [...slots, { zeit: liveZeit, auslastung: nowPct }]
          .sort((a, b) => hhmm(a.zeit) - hhmm(b.zeit));
      }
    }
  }
  const n       = slots.length;
  const vals    = slots.map(s => s.auslastung);
  const histVals = slots.map(s => s.hist).filter(h => h != null);
  const maxV    = Math.max(...vals.filter(v => v != null), ...histVals, 0.001);
  const norm    = vals.map(v => v != null ? v / maxV : null);

  // Letzter Slot mit echten Daten → wird hervorgehoben (nur für «heute»)
  const lastDataIdx = isToday ? vals.reduce((li, v, i) => v != null ? i : li, -1) : -1;

  // Für Auto-Scroll: zeitlich nächster Slot zum jetzigen Zeitpunkt (nur heute + offen)
  const nowIdx = (isToday && computeIsOpen(uid)) ? slots.reduce((bi, s, i) =>
    Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi, 0) : -1;

  const H   = 34;
  const W   = 100;
  const gap = n > 20 ? 0.3 : 0.8;
  const bw  = (W / n) - gap;
  const xs  = i => i * (W / n) + gap / 2;
  const ys  = v => H - 2 - Math.max(0.04, v) * (H - 4);

  const chartH  = zoomed ? 200 : 116;
  const labelFz = zoomed ? '10px' : '9px';

  // Y-Achse: absolute Gästezahl wenn maxspace bekannt, sonst Prozent als Fallback
  const liveMaxspace = LIVE?.venues?.[uid]?.maxspace;
  const absMax  = liveMaxspace != null ? Math.round(maxV / 100 * liveMaxspace) : null;
  const yAxisW  = absMax != null && absMax >= 1000 ? 42 : 32;

  const yAxis = [1, 0.67, 0.33, 0].map(f => {
    const topPct = (ys(f) / H * 100).toFixed(1);
    const val = absMax != null
      ? (f === 0 ? '0' : numFmt(Math.round(f * absMax)))
      : (f === 0 ? '0%' : Math.round(Math.min(100, maxV * f)) + '%');
    return `<span style="position:absolute;top:${topPct}%;right:0;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:8px;color:#ADADA9;line-height:1;white-space:nowrap;">${val}</span>`;
  }).join('');

  const gridLines = [0, 0.33, 0.67, 1].map(f => {
    const gy = ys(f);
    return `<line x1="0" x2="${W}" y1="${gy.toFixed(1)}" y2="${gy.toFixed(1)}" stroke="#ECECE9" stroke-width="0.5" vector-effect="non-scaling-stroke"/>`;
  }).join('');

  const ghostBars = slots.map((s, i) => {
    if (!s.hist) return '';
    const v = s.hist / maxV;
    const y = ys(v);
    return `<rect x="${xs(i).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, (H - 2) - y).toFixed(1)}" rx="${Math.min(1.4, bw * 0.25).toFixed(1)}" fill="${periodColor}26"/>`;
  }).join('');

  const bars = norm.map((v, i) => {
    if (v === null) return '';
    const isLatest = i === lastDataIdx;
    const isNow    = i === nowIdx;
    const y    = ys(v);
    const fill = isLatest ? periodColor : (isToday ? periodColor + '80' : periodColor + '26');
    return `<rect${isNow ? ' data-now="true"' : ''} x="${xs(i).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, (H - 2) - y).toFixed(1)}" rx="${Math.min(1.4, bw * 0.25).toFixed(1)}" fill="${fill}"/>`;
  }).join('');

  // Label-Position: linker Rand des Balkens (i/n * 100%)
  // Übersicht: jeden 2. Stunden-Bar (= alle 2 Std); Zoom: jeden Bar
  const labelStep = zoomed ? 1 : 2;
  function makeLabels(arr) {
    return arr.map((s, i) => {
      if (i % labelStep !== 0 && i !== arr.length - 1) return '';
      const pct = (i / arr.length * 100).toFixed(1);
      return `<span style="position:absolute;left:${pct}%;font-family:'IBM Plex Mono',monospace;font-size:${labelFz};color:#ADADA9;white-space:nowrap;">${s.zeit}</span>`;
    }).join('');
  }

  const yAxisEl = `<div style="position:absolute;left:-${yAxisW}px;top:0;width:${yAxisW - 4}px;height:${chartH}px;">${yAxis}</div>`;
  const svgEl   = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="${chartH}" style="display:block;overflow:visible;">${gridLines}${ghostBars}${bars}</svg>`;

  if (zoomed) {
    // Mindestbreite: immer > Container (mind. 900px total oder 80px pro Bar)
    const minW = Math.max(n * 80, 900);
    return `
    <div style="position:relative;margin-left:${yAxisW}px;">
      ${yAxisEl}
      <div id="chart-scroll" style="overflow-x:scroll;overflow-y:hidden;touch-action:pan-x;-webkit-overflow-scrolling:touch;">
        <div style="min-width:${minW}px;">
          ${svgEl}
          <div style="position:relative;height:16px;margin-top:7px;">${makeLabels(slots)}</div>
        </div>
      </div>
    </div>`;
  }

  // Übersicht: kein Scroll, alle Balken komprimiert sichtbar
  return `
    <div style="position:relative;margin-left:${yAxisW}px;">
      ${yAxisEl}
      ${svgEl}
      <div style="position:relative;height:16px;margin-top:7px;">${makeLabels(slots)}</div>
    </div>`;
}

function seasonChart(uid, half, color) {
  const SOMMER = ['Mai','Jun','Jul','Aug','Sep'];
  const WINTER = ['Okt','Nov','Dez','Jan','Feb','Mär'];
  const months = half === 'sommer' ? SOMMER : WINTER;
  const saison = AW[uid]?.saison;

  // Wenn saisonale Durchschnittswerte vorhanden: zwei Balken (Sommer vs. Winter)
  if (saison) {
    const sVal = saison['Sommer_Mai_Sep'];
    const wVal = saison['Winter_Okt_Apr'];
    const vals = half === 'sommer'
      ? [sVal ?? 0, wVal ?? 0]
      : [wVal ?? 0, sVal ?? 0];
    const labels = half === 'sommer' ? ['Sommer', 'Winter'] : ['Winter', 'Sommer'];
    const colors = half === 'sommer' ? [ORANGE, INK + '60'] : [BLACK, ORANGE + '60'];
    const max = Math.max(...vals, 0.001);
    const norm = vals.map(v => v / max);
    const n = 2;
    const W = 100, H = 34, gap = 8;
    const bw = (W - gap) / n;
    const xs = i => i * (bw + gap);
    const ys = v => H - 2 - Math.max(0.04, v) * (H - 4);
    const bars = norm.map((v, i) => {
      const y = ys(v);
      return `<rect x="${xs(i).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, (H - 2) - y).toFixed(1)}" rx="2" fill="${colors[i]}"/>`;
    }).join('');
    const labelDivs = labels.map((l, i) =>
      `<div style="flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ADADA9;">${l}<br><span style="font-size:11px;font-weight:600;color:${INK};">${vals[i] != null ? vals[i].toFixed(1) + '%' : '–'}</span></div>`
    ).join('');
    return `
      <div style="height:116px;position:relative;">
        <div style="height:100%;">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="100%" style="display:block;">${bars}</svg>
        </div>
      </div>
      <div style="display:flex;gap:2px;margin-top:10px;">${labelDivs}</div>`;
  }

  // Noch keine Saisondaten: Monats-Platzhalter mit Hinweis
  const isSummer = half === 'sommer';
  const bars = months.map((m, i) => {
    const h = isSummer ? [20, 45, 70, 60, 30][i] ?? 20 : [35, 40, 45, 42, 38, 30][i] ?? 30;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="width:100%;height:${h}px;background:${color}22;border-radius:3px 3px 0 0;border-top:2px dashed ${color}44;"></div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#ADADA9;">${m}</span>
    </div>`;
  }).join('');
  const verfuegbarAb = (() => {
    const ersteM = AW[uid]?.erste_messung;
    if (!ersteM) return null;
    const [y, mo] = ersteM.split('-').map(Number);
    const MONATE = ['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return (mo >= 5 && mo <= 9) ? `${MONATE[10]} ${y}` : `${MONATE[5]} ${y + 1}`;
  })();
  return `
    <div style="display:flex;align-items:flex-end;gap:4px;height:90px;">${bars}</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ADADA9;margin-top:10px;">Noch keine Daten${verfuegbarAb ? ` – verfügbar ab ca. ${verfuegbarAb}` : ''}</div>
    `;
}

// ── Tile gauge SVG (weiße Balken auf farbigem Hintergrund) ───────────────
function tileGaugeSVG(uid, open) {
  const dayType = dayTypeFor(todayWd());
  const slots = slotsFor(uid, dayType);
  if (!slots.length) return '<div style="height:34px;"></div>';
  const vals = slots.map(s => s.auslastung);
  const max = Math.max(...vals, 0.001);
  const norm = vals.map(v => v / max);
  const nowMin = nowHHMM();
  const nowIdx = open ? slots.reduce((bi, s, i) =>
    Math.abs(hhmm(s.zeit) - nowMin) < Math.abs(hhmm(slots[bi].zeit) - nowMin) ? i : bi, 0) : -1;
  const n = norm.length;
  const gap = n > 12 ? 0.3 : 0.7;
  const bw = (100 / n) - gap;
  const xs = i => i * (100 / n) + gap / 2;
  const bars = norm.map((v, i) => {
    const isNow = open && i === nowIdx;
    const h = Math.max(4, v * 100);
    const fill = isNow ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.28)';
    return `<div style="flex:1;height:${h.toFixed(1)}%;background:${fill};border-radius:2px 2px 0 0;position:relative;">
      ${isNow ? `<div style="position:absolute;left:0;right:0;bottom:${(v*100).toFixed(1)}%;height:0;border-top:2px dotted rgba(255,255,255,.5);"></div>` : ''}
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:${gap}px;height:34px;">${bars}</div>`;
}

        ? `<div style="font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:-.02em;color:rgba(255,255,255,.55);line-height:1;font-size:22px;">Revision</div>`
        : `<div style="font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:-.02em;color:${fill != null ? '#fff' : 'rgba(255,255,255,.55)'};line-height:1;font-size:${fill != null ? '40px' : '18px'};">${guestStr}</div>
           ${fill != null ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.75);">Gäste jetzt</div>` : ''}`}
    </div>` : ''}
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;color:#fff;">
      <i class="${isOpen ? 'pulse' : ''}" style="width:7px;height:7px;border-radius:50%;background:#fff;display:inline-block;flex-shrink:0;"></i>
      ${statusLabel}<span style="color:rgba(255,255,255,.6);font-weight:500;"> · ${tempStr} Wasser</span>
    </div>
    ${inRevision && revision ? `
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.22);">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:rgba(255,255,255,.6);">${fmtRevDate(revision.von)} – ${fmtRevDate(revision.bis)}</div>
    </div>` : !inRevision && hasGuests ? `
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.22);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.75);font-weight:700;">Auslastung</span>
        <span style="display:inline-flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#fff;">
          <span style="font-size:9px;line-height:1;">${dev.arrow}</span>${dev.short}
        </span>
      </div>
      <div style="margin-top:11px;">${gauge}</div>
    </div>` : ''}
  </div>`;
}

// ── Render: detail modal ──────────────────────────────────────────────────
function renderDetail() {
  const v = VENUE_MAP[S.currentUid];
  if (!v) return '';
  const live = LIVE?.venues?.[v.uid];
  const inRevision = isInRevision(v.uid);
  const revision   = REVISIONEN[v.uid] || null;
  const isOpen = computeIsOpen(v.uid);
  const fill = live?.currentfill;
  const temp = live?.temperatureWater;
  const isHalle   = v.type === 'halle';
  const hallePools = isHalle ? (HALLE_TEMPS[v.uid] || null) : null;
  const hasTemp   = isHalle
    ? (hallePools != null && hallePools.length > 0)
    : (temp != null && temp !== '');
  const displayTemp = isHalle
    ? (hallePools ? hallePools[0].temp + '°' : '–')
    : (hasTemp ? parseFloat(temp) + '°' : '–');
  const hasGuests = live?.maxspace != null;
  const fav = !!S.favs[v.uid];

  // "Daten seit..." — erste echte Messung aus auswertung.json
  const ersteMessung = AW[v.uid]?.erste_messung;
  const dataSeit = (() => {
    if (!ersteMessung) return null;
    const [y, mo, d] = ersteMessung.split('-').map(Number);
    const MONATE = ['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return `${d}. ${MONATE[mo]} ${y}`;
  })();
  const typeColor = TYPE_COLOR[v.type];
  const statusColor = isOpen ? '#2A9D63' : META;
  const statusDot = isOpen ? '#2A9D63' : '#CFCFCC';
  const guestColor = isOpen ? BLACK : META;

  // Period tabs — Winter nur für Ganzjahres-Badis
  const isYearRound = v.season === 'Ganzjährig';
  const periods = [
    { key:'heute',  label:'Hüt',       color: PURPLE },
    { key:'woche',  label:'Die Wuche', color: INK    },
    { key:'sommer', label:'☀ Sommer',  color: ORANGE },
    ...(isYearRound ? [{ key:'winter', label:'❄ Winter', color: BLACK }] : []),
  ];
  const periodTabs = periods.map(p => {
    const active = S.period === p.key;
    return `<button onclick="setPeriod('${p.key}')"
      style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.02em;padding:9px 16px;border-radius:999px;border:${active ? 'none' : '1.5px solid ' + p.color};background:${active ? p.color : 'transparent'};color:${active ? '#fff' : p.color};cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .12s;">
      ${p.label}
    </button>`;
  }).join('');

  // Weekday tabs (only for "woche" period)
  const wdEntries = [
    {k:'mo',l:'Mäntig'}, {k:'di',l:'Zistig'}, {k:'mi',l:'Mittwuch'},
    {k:'do',l:'Dunstig'}, {k:'fr',l:'Friitg'}, {k:'sa',l:'Samstig'}, {k:'so',l:'Suntig'},
  ];
  const weekdayTabs = wdEntries.map(w => {
    const active = S.weekday === w.k;
    return `<button onclick="setWeekday('${w.k}')"
      style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.01em;padding:0 8px;height:34px;border-radius:999px;border:${active ? 'none' : '1.5px solid ' + INK};background:${active ? INK : 'transparent'};color:${active ? '#fff' : INK};cursor:pointer;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .12s;min-width:0;">
      ${w.l}
    </button>`;
  }).join('');

// Chart controls (only for heute/woche) — drei Modi
  const showChartControls = S.period === 'heute' || S.period === 'woche';
  const chartModes = [
    { mode: 'overview', label: 'Übersicht', active: !S.chartZoomed },
    { mode: '1h',       label: '1 Std',     active: S.chartZoomed && S.chartRes === '1h' },
    { mode: '15min',    label: '15 Min',    active: S.chartZoomed && S.chartRes === '15min' },
  ];
  const chartControls = chartModes.map(({ mode, label, active }) =>
    `<button onclick="setChartMode('${mode}')"
      style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:6px 14px;border-radius:999px;border:1.5px solid ${INK};background:${active ? INK : 'transparent'};color:${active ? '#fff' : INK};cursor:pointer;transition:all .12s;">
      ${label}
    </button>`
  ).join('');

  // Chart
  let chart;
  if (S.period === 'sommer' || S.period === 'winter') {
    chart = seasonChart(v.uid, S.period, S.period === 'sommer' ? ORANGE : BLACK);
  } else {
    const chartDayType = S.period === 'heute' ? 'Heute' : dayTypeFor(S.weekday);
    const chartColor = S.period === 'heute' ? PURPLE : INK;
    const showFocus = S.period === 'heute' || S.weekday === todayWd();
    const chartWd = S.period === 'heute' ? todayWd() : S.weekday;
    chart = detailBarChart(v.uid, chartDayType, chartColor, S.chartZoomed, S.chartRes, showFocus, chartWd);
  }


  // Stat cards
  const statBg = '#F4F4F4';

  // Guest weekly list — Summe aller currentfill-Messungen pro Wochentag
  const guestList = wdEntries.map(w => {
    const isToday = todayWd() === w.k;
    const total = GUEST_WEEK_TOTAL[v.uid]?.[w.k];
    const val = total != null ? '~' + numFmt(Math.round(total)) : '–';
    const accentBg = isToday ? typeColor : 'transparent';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:8px;background:${accentBg};">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:${isToday ? 600 : 400};color:${isToday ? '#fff' : INK};">${w.l}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${isToday ? '#fff' : META};">${val}</span>
    </div>`;
  }).join('');

  const tempList = wdEntries.map(w => {
    const isToday = todayWd() === w.k;
    const weekTemp = TEMP_WEEK[v.uid]?.[w.k];
    const tVal = isToday && hasTemp ? parseFloat(temp) + '°'
               : weekTemp != null   ? weekTemp + '°'
               : '–';
    const accentBg = isToday ? typeColor : 'transparent';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:8px;background:${accentBg};">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:${isToday ? 600 : 400};color:${isToday ? '#fff' : INK};">${w.l}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${isToday ? '#fff' : META};">${tVal}</span>
    </div>`;
  }).join('');

  // Halle: statische Becken-Liste statt Wochentags-Vergleich
  const halleTempList = (hallePools || []).map(p =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:8px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:${INK};">${p.name}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${META};">${p.temp}°</span>
    </div>`
  ).join('');

  // Hours weekly
  const hoursList = wdEntries.map(w => {
    const isToday = todayWd() === w.k;
    const accentBg = isToday ? typeColor : 'transparent';
    const h = hoursForDay(v.uid, w.k) || '–';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:8px;background:${accentBg};">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:${isToday ? 600 : 400};color:${isToday ? '#fff' : INK};">${w.l}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${isToday ? '#fff' : META};">${h}</span>
    </div>`;
  }).join('');

  return `
  <div class="modal-scrim" onclick="closeDetail(event)" style="${S.chartZoomed ? 'overflow-y:hidden;' : ''}">
    <div class="modal-sheet" onclick="event.stopPropagation()" style="${S.chartZoomed ? 'overflow-y:hidden;' : ''}">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;">
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:${META};font-weight:600;">${TYPE_LABEL[v.type]}</div>
          <span style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:${statusColor};">
            <i style="width:6px;height:6px;border-radius:50%;background:${statusDot};display:inline-block;"></i>${isInRevision(v.uid) ? 'Revision' : isOpen ? (closingTime(v.uid) ? 'offen bis ' + closingTime(v.uid) : 'offen') : 'geschlossen'}
            <span style="color:${META};">· ${v.season}</span>
          </span>
        </div>
        <button onclick="closeDetail(event)" style="font-family:'IBM Plex Mono',monospace;font-size:20px;line-height:1;font-weight:600;color:${INK};background:none;border:none;cursor:pointer;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">×</button>
      </div>

      <div style="display:flex;align-items:baseline;gap:10px;margin-top:8px;flex-wrap:wrap;">
        <h1 style="font-family:'Outfit',sans-serif;font-size:clamp(24px,4vw,36px);font-weight:600;letter-spacing:-.01em;line-height:1.05;color:${INK};">${v.name}</h1>
        <button onclick="toggleFav('${v.uid}')" aria-label="Favorit"
          style="font-size:20px;line-height:1;background:none;border:none;cursor:pointer;padding:2px;color:${fav ? PURPLE : '#CFCFCC'};transition:color .15s;flex-shrink:0;">${fav ? '★' : '☆'}</button>
      </div>
      ${v.note ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:${META};margin-top:6px;">${v.note}</div>` : ''}
      <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${META};margin-top:6px;">${v.address}</div>

      <!-- Stat cards -->
      <div style="margin-top:clamp(16px,4vw,24px);display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;">
        <!-- Gäste (nur wenn Zählung vorhanden) -->
        ${fill != null || hasGuests ? `
        <div class="stat-card" onclick="${hasGuests ? "toggleStat('guest')" : ''}" id="sc-guest" style="${hasGuests ? '' : 'cursor:default;'}">
          <div>
            ${fill != null
              ? `<div style="font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:-.02em;line-height:.85;color:${guestColor};font-size:clamp(32px,8vw,48px);">${numFmt(fill)}</div>`
              : `<div style="font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:-.01em;line-height:1.1;color:${META};font-size:clamp(16px,4vw,22px);">Keine Daten</div>`
            }
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:${META};font-weight:700;margin-top:10px;">Gäste jetzt</div>
          </div>
          ${S.guestOpen && hasGuests ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #E2E2E0;display:flex;flex-direction:column;gap:2px;">${guestList}</div>` : ''}
        </div>` : ''}

        <!-- Temperatur + Öffnungszeiten: gemeinsamer Sub-Container damit beide gleich hoch sind -->
        <div style="display:flex;gap:10px;flex:2;min-width:300px;align-items:stretch;">
          ${isHalle && !hasTemp ? '' : `
          <div class="stat-card" onclick="${hasTemp ? "toggleStat('temp')" : ''}" id="sc-temp" style="cursor:${hasTemp ? 'pointer' : 'default'};flex:1;">
            <div>
              <div style="font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:-.02em;line-height:.85;color:${hasTemp ? BLACK : META};font-size:clamp(32px,8vw,48px);">${displayTemp}</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:${META};font-weight:700;margin-top:10px;">${isHalle ? 'Beckentemperatur' : 'Wassertemperatur'}</div>
            </div>
            ${S.tempOpen && hasTemp ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #E2E2E0;display:flex;flex-direction:column;gap:2px;">${isHalle ? halleTempList : tempList}</div>` : ''}
          </div>`}

          <div class="stat-card" onclick="toggleStat('hours')" id="sc-hours" style="flex:1;">
            <div>
              <div style="font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:-.02em;line-height:.95;color:${BLACK};font-size:clamp(18px,4vw,26px);white-space:nowrap;">${hoursForDay(v.uid, todayWd()) || v.hours}</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:${META};font-weight:700;margin-top:10px;">Öffnigszite</div>
            </div>
            ${S.hoursOpen ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid #E2E2E0;display:flex;flex-direction:column;gap:2px;">${hoursList}</div>` : ''}
          </div>
        </div>
      </div>

      ${inRevision && revision ? `
      <div style="margin-top:clamp(18px,4vw,28px);padding:clamp(20px,4vw,28px);background:#F4F4F4;border-radius:20px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:${META};font-weight:600;">Revision</div>
        <div style="font-family:'Outfit',sans-serif;font-size:clamp(17px,3vw,22px);font-weight:600;color:${INK};">Geschlossen vom ${fmtRevDate(revision.von)} bis ${fmtRevDate(revision.bis)}</div>
      </div>` : hasGuests ? `<!-- Chart section -->
      <div style="margin-top:clamp(18px,4vw,28px);">
        <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.005em;color:${INK};text-transform:uppercase;">Wie voll isch es</div>
        <div style="display:flex;gap:6px;margin-top:clamp(10px,3vw,16px);flex-wrap:wrap;align-items:center;justify-content:space-between;">
          <div style="display:flex;gap:6px;">${periodTabs}</div>
          ${showChartControls ? `<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">${chartControls}</div>` : ''}
        </div>
        ${S.period === 'woche' ? `<div style="display:flex;gap:4px;margin-top:12px;">${weekdayTabs}</div>` : ''}
        <div style="margin-top:clamp(12px,3vw,20px);">${chart}</div>
        ${dataSeit ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ADADA9;margin-top:8px;padding-left:2px;">Daten seit ${dataSeit}</div>` : ''}
      </div>` : ''}
    </div>
  </div>`;
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  // Wenn der User gerade den Chart scrollt: DOM nicht zerstören, später nachholen
  if (_touchActive) { _renderQueued = true; return; }
  _renderQueued = false;

  const list = filteredVenues();
  const liveTs = LIVE?.timestamp;
  const d = new Date();
  const dateLabel = d.toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long' });
  const timeLabel = liveTs ? liveTs.slice(11, 16) : d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  let ageLabel = '';
  if (liveTs) {
    const liveDate = new Date(liveTs.replace(' ', 'T') + '+02:00');
    const ageMin = Math.round((d - liveDate) / 60000);
    if (ageMin >= 1) ageLabel = ` · vor ${ageMin} Min`;
  }

  const cards = list.map(renderCard).join('');
  const isEmpty = list.length === 0;

  const html = `
    <div style="max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:22px;">

      <div>
        <h1 style="font-family:'Outfit',sans-serif;font-size:clamp(28px,4vw,40px);font-weight:600;letter-spacing:-.01em;line-height:.95;color:${INK};">Wasserziit</h1>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:${META};margin-top:8px;letter-spacing:.03em;">
          Stand ${dateLabel}${liveTs ? ', ' + timeLabel + ' Uhr' + ageLabel : ''}
        </div>
      </div>

      <section style="background:#FFFFFF;border-radius:28px;padding:22px;box-shadow:0 4px 22px rgba(23,61,52,.08);display:flex;flex-direction:column;gap:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${renderChips()}
          </div>
          <div style="display:inline-flex;align-items:center;gap:2px;background:#173D34;border-radius:999px;padding:3px;flex-shrink:0;">
            <button onclick="setViewMode('cards')" title="Kacheln"
              style="width:27px;height:27px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
                     background:${S.viewMode==='cards'?'#fff':'transparent'};color:${S.viewMode==='cards'?'#173D34':'rgba(255,255,255,.75)'};">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/>
                <rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/>
              </svg>
            </button>
            <button onclick="setViewMode('map')" title="Karte"
              style="width:27px;height:27px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
                     background:${S.viewMode==='map'?'#fff':'transparent'};color:${S.viewMode==='map'?'#173D34':'rgba(255,255,255,.75)'};">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 1.5a4 4 0 0 1 4 4c0 2.8-4 9-4 9S4 8.3 4 5.5a4 4 0 0 1 4-4zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
              </svg>
            </button>
          </div>
        </div>

        <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:${META};">
          ${list.length} Badis · ${list.filter(v => computeIsOpen(v.uid)).length} offen
        </div>

        ${S.viewMode === 'map' ? `
          <div style="position:relative;">
            <div id="map-slot" style="width:100%;height:clamp(400px,58vh,580px);border-radius:20px;background:#DEDEDE;"></div>
            <div style="position:absolute;top:12px;right:12px;z-index:1000;display:inline-flex;align-items:center;gap:3px;background:#000;border-radius:999px;padding:4px;">
              <button data-basemap="gray" onclick="setMapBasemap('gray')"
                style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.03em;padding:5px 13px;border-radius:999px;border:none;cursor:pointer;
                       background:${_mapBasemap==='gray'?'#fff':'transparent'};color:${_mapBasemap==='gray'?'#000':'#fff'};">Hell</button>
              <button data-basemap="dark" onclick="setMapBasemap('dark')"
                style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.03em;padding:5px 13px;border-radius:999px;border:none;cursor:pointer;
                       background:${_mapBasemap==='dark'?'#fff':'transparent'};color:${_mapBasemap==='dark'?'#000':'#fff'};">Dunkel</button>
            </div>
          </div>` : isEmpty ? `
          <div style="padding:44px 10px 54px;text-align:center;">
            <div style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:600;color:${INK};">Keni Badis gfunde</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${META};margin-top:10px;line-height:1.6;">Probier en andere Filter ode füeg Favoriten hinzue.</div>
          </div>` : `
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
            ${cards}
          </div>`}
      </section>

  // Scroll-Position vor Neuaufbau sichern (nur wenn kein expliziter Reset gewünscht)
  if (S.chartZoomed && S._chartScrollLeft === undefined) S._chartScrollLeft = -1;
  const prevScrollLeft = document.getElementById('chart-scroll')?.scrollLeft ?? -1;
  if (S.chartZoomed && prevScrollLeft >= 0 && S._chartScrollLeft !== -1) {
    S._chartScrollLeft = prevScrollLeft;
  }

  document.getElementById('app').innerHTML = html;

  if (S.viewMode === 'map') {
    setTimeout(() => initOrUpdateMap(), 0);
  } else if (_map) {
    // Detach map container when switching back to cards (reuse later)
    getMapEl().remove();
  }

  // Scroll-Position wiederherstellen oder zum "jetzt"-Balken scrollen
  if (S.chartZoomed && S.currentUid) {
    setTimeout(() => {
      const scroller = document.getElementById('chart-scroll');
      if (!scroller) return;

      if (S._chartScrollLeft >= 0) {
        scroller.scrollLeft = S._chartScrollLeft;
      } else {
        const nowBar = scroller.querySelector('[data-now="true"]');
        if (nowBar) {
          const sr = scroller.getBoundingClientRect();
          const br = nowBar.getBoundingClientRect();
          S._chartScrollLeft = Math.max(0, br.left - sr.left - scroller.clientWidth / 2 + br.width / 2);
          scroller.scrollLeft = S._chartScrollLeft;
        }
      }

      // Scroll-Position laufend in S._chartScrollLeft speichern
      scroller.addEventListener('scroll', () => {
        S._chartScrollLeft = scroller.scrollLeft;
      }, { passive: true });

      // Render während Touch blockieren, danach nachholen
      scroller.addEventListener('touchstart', () => { _touchActive = true; }, { passive: true });
      const onTouchEnd = () => {
        _touchActive = false;
        if (_renderQueued) render();
      };
      scroller.addEventListener('touchend',    onTouchEnd, { passive: true });
      scroller.addEventListener('touchcancel', onTouchEnd, { passive: true });
    }, 0);
  }


  // Temperatur- und Öffnungszeiten-Kachel auf gleiche Höhe bringen
  setTimeout(() => {
    const tempEl  = document.getElementById('sc-temp');
    const hoursEl = document.getElementById('sc-hours');

    tempEl.style.minHeight  = '';
    hoursEl.style.minHeight = '';
    const h = Math.max(tempEl.offsetHeight, hoursEl.offsetHeight);
    tempEl.style.minHeight  = h + 'px';
    hoursEl.style.minHeight = h + 'px';
  }, 0);
}

function toggleStat(which) {

  const guestEl = document.getElementById('sc-guest');

      group = Object.keys(els).filter(k => els[k] && Math.round(els[k].getBoundingClientRect().top) === clickedTop);

  const next = !S[which + 'Open'];
  group.forEach(k => { S[k + 'Open'] = next; });
  render();
}

// Relative zur aktuellen Seite — funktioniert auf GitHub Pages und lokal
const BASE = new URL('.', document.baseURI).href;

function parseLive(raw) {
  if (!raw) return null;
  const venues = {};
  for (const [uid, v] of Object.entries(raw.venues || {})) {
    const meta = VENUE_MAP[uid];
    const rawTemp = v.temperatureWater;
    const temp = (rawTemp != null && rawTemp !== '') ? Number(rawTemp) : (meta?.defaultTemp ?? null);
    venues[uid] = {
      currentfill:      (v.currentfill != null && v.currentfill !== '') ? Number(v.currentfill) : null,
      freespace:        (v.freespace   != null && v.freespace   !== '') ? Number(v.freespace)   : null,
      maxspace:         (v.maxspace    != null && v.maxspace    !== '') ? Number(v.maxspace)    : null,
      temperatureWater: temp,
      openClosed:       v.openClosed,
    };
  }
  return { timestamp: raw.timestamp, venues };
}

const MAP_BASEMAPS = {
  gray: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', attr:'Esri, HERE, Garmin' },
  dark: { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',                                                attr:'© OpenStreetMap, © CARTO', sub:'abcd', cls:'dc-dark-soft' },
};

function getMapEl() {
  if (!_mapEl) {
    _mapEl = document.createElement('div');
    _mapEl.style.cssText = 'width:100%;height:clamp(400px,58vh,580px);border-radius:20px;overflow:hidden;background:#DEDEDE;';
  }
  return _mapEl;
}

function setViewMode(mode) {
  S.viewMode = mode;
  render();
}

function setMapBasemap(key) {
  _mapBasemap = key;
  if (_map && _baseLayer) {
    _map.removeLayer(_baseLayer);
    const b = MAP_BASEMAPS[key];
    const opts = { maxZoom:19, attribution:b.attr };
    if (b.sub) opts.subdomains = b.sub;
    if (b.cls) opts.className  = b.cls;
    _baseLayer = L.tileLayer(b.url, opts).addTo(_map);
  }
  // re-render only for the chip highlight update
  const btns = document.querySelectorAll('[data-basemap]');
  btns.forEach(btn => {
    const active = btn.dataset.basemap === key;
    btn.style.background = active ? '#fff' : 'transparent';
    btn.style.color       = active ? '#000' : '#fff';
  });
}

let _baseLayer = null;

function initOrUpdateMap() {
  const el = getMapEl();
  const slot = document.getElementById('map-slot');
  if (slot) slot.replaceWith(el);

  if (!_map) {
    _map = L.map(el, { zoomControl:true, scrollWheelZoom:false, attributionControl:true })
             .setView([47.378, 8.540], 13);
    const b = MAP_BASEMAPS[_mapBasemap];
    const opts = { maxZoom:19, attribution:b.attr };
    if (b.sub) opts.subdomains = b.sub;
    if (b.cls) opts.className  = b.cls;
    _baseLayer = L.tileLayer(b.url, opts).addTo(_map);
  } else {
    setTimeout(() => _map.invalidateSize(), 50);
  }

  updateMapMarkers();
}

function updateMapMarkers() {
  if (!_map) return;
  const visible = new Set(filteredVenues().map(v => v.uid));

  VENUES.forEach(v => {
    if (!v.lat) return;
    const show = visible.has(v.uid);
    const col  = TYPE_COLOR[v.type] || INK;
    const open = computeIsOpen(v.uid);
    const fill  = open ? col : '#CFCFCC';
    const stroke = open ? col : '#ADADA9';

    if (_markers[v.uid]) {
      if (show) {
        _markers[v.uid].setStyle({ fillColor:fill, color:stroke });
        if (!_map.hasLayer(_markers[v.uid])) _markers[v.uid].addTo(_map);
      } else {
        _map.removeLayer(_markers[v.uid]);
      }
    } else if (show) {
      const mk = L.circleMarker([v.lat, v.lng], {
        radius:10, color:stroke, weight:2, fillColor:fill, fillOpacity:0.82,
      }).addTo(_map);
      mk.bindTooltip(v.name, { permanent:false, direction:'top', offset:[0,-8],
        className:'', opacity:1 });
      mk.on('click', () => openDetail(v.uid));
      _markers[v.uid] = mk;
    }
  });
}

function fetchLive() {
  return fetch(BASE + 'data/live.json?t=' + Date.now()).then(r => r.ok ? r.json() : null).catch(() => null);
}

async function loadHeuteSlots() {
  const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Zurich' }); // "2026-07-05"
  const WD_MAP = ['so','mo','di','mi','do','fr','sa'];
  try {
    const r = await fetch(BASE + 'data/besucher/' + currentWeekFile() + '.csv?t=' + Date.now());
    if (!r.ok) return;
    const lines = (await r.text()).trim().split('\n').slice(1);
    const nextSlots = {}, nextTotals = {};
    for (const line of lines) {
      const [timestamp, uid, , currentfill, , maxspace] = line.split(',');
      if (!timestamp || !uid || !VENUE_MAP[uid]) continue;
      const cf = parseFloat(currentfill);
      if (isNaN(cf) || cf < 0) continue;
      // Tages-Summe für alle Wochentage
      const wd = WD_MAP[new Date(timestamp.slice(0, 10)).getDay()];
      if (!nextTotals[uid]) nextTotals[uid] = {};
      nextTotals[uid][wd] = (nextTotals[uid][wd] || 0) + cf;
      // Auslastungs-Slots nur für heute
      if (!timestamp.startsWith(today)) continue;
      const ms = parseFloat(maxspace);
      if (!ms) continue;
      // Auf nächste 15-min-Grenze runden (14:59 → 15:00, 08:29 + 08:30 → selber Slot)
      const raw = timestamp.slice(11, 16);
      const [rh, rm] = raw.split(':').map(Number);
      const snapped = Math.round((rh * 60 + rm) / 15) * 15;
      const zeit = String(Math.floor(snapped / 60) % 24).padStart(2, '0') + ':' + String(snapped % 60).padStart(2, '0');
      if (!nextSlots[uid]) nextSlots[uid] = {};
      if (!nextSlots[uid][zeit]) nextSlots[uid][zeit] = { sum: 0, count: 0 };
      nextSlots[uid][zeit].sum += cf / ms * 100;
      nextSlots[uid][zeit].count++;
    }
    HEUTE_SLOTS = {};
    for (const [uid, slotMap] of Object.entries(nextSlots)) {
      HEUTE_SLOTS[uid] = Object.entries(slotMap)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([zeit, { sum, count }]) => ({ zeit, auslastung: sum / count }));
    }
    GUEST_WEEK_TOTAL = nextTotals;
  } catch(e) {}
}

async function loadTempSlots() {
  try {
    const r = await fetch(BASE + 'data/temperaturen/' + currentWeekFile() + '.csv?t=' + Date.now());
    if (!r.ok) return;
    const WD = ['so','mo','di','mi','do','fr','sa'];
    const next = {};
    for (const line of (await r.text()).trim().split('\n').slice(1)) {
      const [timestamp, tempUid, , temperatureWater] = line.split(',');
      if (!timestamp || !tempUid || !temperatureWater) continue;
      const uid = _TEMP_UID_REV[tempUid];
      if (!uid) continue;
      const temp = parseFloat(temperatureWater);
      if (isNaN(temp)) continue;
      const wd = WD[new Date(timestamp.slice(0, 10)).getDay()];
      if (!next[uid]) next[uid] = {};
      next[uid][wd] = temp; // letzte Messung des Tages gewinnt
    }
    TEMP_WEEK = next;
  } catch(e) {}
}

async function fetchBesucherWS() {
  return new Promise((resolve, reject) => {
    try {
      const ws = new WebSocket('wss://badi-public.crowdmonitor.ch:9591/api');
      const t = setTimeout(() => { ws.close(); reject(new Error('timeout')); }, 12000);
      ws.onopen    = () => ws.send('');
      ws.onmessage = e => { clearTimeout(t); ws.close(); try { resolve(JSON.parse(e.data)); } catch(err) { reject(err); } };
      ws.onerror   = () => { clearTimeout(t); reject(new Error('ws error')); };
    } catch(e) { reject(e); }
  });
}

async function fetchTemperaturenLive() {
  const r = await fetch('https://www.stadt-zuerich.ch/stzh/bathdatadownload', { cache: 'no-store' });
  if (!r.ok) throw new Error('temp');
  const doc = new DOMParser().parseFromString(await r.text(), 'text/xml');
  const byUid = {}, byName = {};
  for (const bath of doc.querySelectorAll('bath')) {
    const uid  = bath.querySelector('poiid')?.textContent?.trim();
    const name = bath.querySelector('title')?.textContent?.trim();
    const entry = {
      temperatureWater: bath.querySelector('temperatureWater')?.textContent?.trim() || null,
      openClosed:       bath.querySelector('openClosedTextPlain')?.textContent?.trim() || null,
    };
    if (uid)  byUid[uid]   = entry;
    if (name) byName[name] = entry;
  }
  return { byUid, byName };
}

// ── Live-Daten: persistente WebSocket-Verbindung ───────────────────────────
let _temps      = { byUid: {}, byName: {} };
let _lastWsData = null;
let _ws         = null;
let _wsTimer    = null;

function buildLiveFromWS(wsArray) {
  const ts = new Date().toLocaleString('sv-SE', { timeZone: 'Europe/Zurich' });
  const venues = {};
  const { byUid, byName } = _temps;
  for (const bad of wsArray) {
    const uid = bad.uid;
    if (!uid || !VENUE_MAP[uid]) continue;
    const v = VENUE_MAP[uid];
    if (v.noOccupancy) continue;
    const tempUid = v.tempUid || uid;
    const t = byUid[tempUid] || byName[v.name] || {};
    const wsTemp = bad.temperatureWater != null ? String(bad.temperatureWater) : null;
    venues[uid] = {
      currentfill:      bad.currentfill,
      freespace:        bad.freespace,
      maxspace:         bad.maxspace,
      temperatureWater: t.temperatureWater ?? wsTemp,
      openClosed:       t.openClosed ?? bad.openClosed ?? null,
    };
  }
  // Venues nur in der XML-API (keine Besucherzahlen, aber Temperatur + Status)
  for (const v of VENUES) {
    if (venues[v.uid]) continue;
    const tempUid = v.tempUid;
    if (!tempUid) continue;
    const t = byUid[tempUid] || byName[v.name] || {};
    if (!t.temperatureWater && !t.openClosed) continue;
    venues[v.uid] = {
      currentfill: null, freespace: null, maxspace: null,
      temperatureWater: t.temperatureWater || null,
      openClosed:       t.openClosed       || null,
    };
  }
  return { timestamp: ts, venues };
}

function _wsReconnect(delay) {
  clearTimeout(_wsTimer);
  _wsTimer = setTimeout(connectWS, delay);
}

function connectWS() {
  if (_ws) { try { _ws.close(); } catch(e) {} _ws = null; }
  try {
    const ws = _ws = new WebSocket('wss://badi-public.crowdmonitor.ch:9591/api');
    _wsReconnect(20000); // Verbindungs-Timeout
    ws.onopen = () => ws.send('');
    ws.onmessage = e => {
      _wsReconnect(60000); // wenn 60s keine neue Nachricht kommt → reconnect
      try {
        _lastWsData = JSON.parse(e.data);
        LIVE = parseLive(buildLiveFromWS(_lastWsData));
        render();
      } catch(err) {}
    };
    ws.onerror = () => _wsReconnect(30000);
    ws.onclose = () => _wsReconnect(30000);
  } catch(e) {
    _wsReconnect(30000);
  }
}

// Temperaturen aus live.json lesen (gleiche Origin → kein CORS-Problem).
// Wird als Fallback genutzt wenn die Stadt-Zürich-API CORS-geblockt ist.
async function fetchTempsFromCache() {
  const live = await fetchLive();
  if (!live?.venues) return { byUid: {}, byName: {} };
  const byUid = {}, byName = {};
  for (const [uid, v] of Object.entries(live.venues)) {
    const meta = VENUE_MAP[uid];
    if (!meta) continue;
    const temp   = v.temperatureWater != null ? String(v.temperatureWater) : null;
    const status = v.openClosed || null;
    if (!temp && !status) continue;
    const entry = { temperatureWater: temp, openClosed: status };
    byUid[uid] = entry;
    if (meta.tempUid) byUid[meta.tempUid] = entry;
    byName[meta.name] = entry;
  }
  return { byUid, byName };
}

async function loadTemps() {
  try {
    _temps = await fetchTemperaturenLive(); // XML-API (scheitert im Browser wegen CORS)
  } catch(e) {
    _temps = await fetchTempsFromCache();   // Fallback: live.json (gleiche Origin)
  }
}

async function refreshTemps() {
  await loadTemps();
  if (_lastWsData) { LIVE = parseLive(buildLiveFromWS(_lastWsData)); render(); }
}

// ── Startup ────────────────────────────────────────────────────────────────
Promise.all([
  fetch(BASE + 'auswertung/auswertung.json').then(r => r.ok ? r.json() : null).catch(() => null),
  Promise.allSettled([fetchBesucherWS(), loadTemps()]),
  loadHeuteSlots(),
  loadTempSlots(),
  loadRevisionen(),
  loadStammdaten(),
]).then(([aw, [wsRes]]) => {
  if (aw?.badis) AW = Object.fromEntries(aw.badis.map(b => [b.uid, b]));
  if (wsRes.status === 'fulfilled') {
    _lastWsData = wsRes.value;
    LIVE = parseLive(buildLiveFromWS(_lastWsData));
  } else {
    // WS gescheitert → live.json laden
    fetchLive().then(live => { LIVE = parseLive(live); render(); });
  }
  render();

  // Persistente WS-Verbindung (reconnect bei Trennung, Update bei neuen Daten)
  connectWS();

  // Temperaturen alle 2 Minuten neu laden (nur HTTP möglich)
  setInterval(refreshTemps, 2 * 60 * 1000);

  // Heutige CSV-Messdaten alle 15 Minuten aktualisieren
  setInterval(() => Promise.all([loadHeuteSlots(), loadTempSlots()]).then(() => render()), 15 * 60 * 1000);

  // "vor X Min" Label jede Minute aktualisieren
  setInterval(() => render(), 60 * 1000);
}).catch(() => {
  // Fallback: statische live.json
  fetchLive().then(live => { LIVE = parseLive(live); render(); });
  connectWS();
  loadHeuteSlots();
  loadTempSlots();
  loadRevisionen();
  loadStammdaten();
  setInterval(refreshTemps, 2 * 60 * 1000);
  setInterval(() => Promise.all([loadHeuteSlots(), loadTempSlots()]).then(() => render()), 15 * 60 * 1000);
  setInterval(() => render(), 60 * 1000);
});
</script>
